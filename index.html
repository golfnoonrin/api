<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pichit API Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 p-6">

    <div class="max-w-4xl mx-auto">
        <div class="bg-white p-6 rounded-xl shadow-sm border mb-6">
            <h2 class="text-xl font-bold mb-4">ค้นหาข้อมูล</h2>
            
            <div class="flex gap-4">
                <input type="text" id="searchText" placeholder="พิมพ์คำที่ต้องการค้นหา..." 
                       class="flex-1 border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                
                <button onclick="fetchData()" id="btnSearch" 
                        class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2 rounded-lg font-semibold transition flex items-center">
                    <span>ค้นหา</span>
                    <div id="loader" class="hidden ml-2 w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden border">
            <table class="w-full text-left">
                <thead class="bg-gray-100 border-b">
                    <tr id="tableHeader">
                        <th class="p-4 text-gray-500 font-medium italic">ยังไม่มีข้อมูล...</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzDv31Nv4ikHzovaYl2As5VEe7qpArBoPHap0ZSdGmfhKByvCw-b3p89-YEiARdKApf/exec";
        const TOKEN = "test_token_123";

        async function fetchData() {
            const searchText = document.getElementById('searchText').value;
            const btn = document.getElementById('btnSearch');
            const loader = document.getElementById('loader');

            // แสดงสถานะโหลด
            btn.disabled = true;
            loader.classList.remove('hidden');

            // เตรียมข้อมูลส่งไปที่หลังบ้าน (ส่งแค่ searchText)
            const requestData = {
                token: TOKEN,
                sheetName: "Sheet1",
                searchText: searchText, // ส่งค่าจากช่อง input
                options: {
                    limit: 20,
                    offset: 0
                }
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(requestData)
                });

                const result = await response.json();

                if (result.success) {
                    renderTable(result.data);
                } else {
                    alert("Error: " + result.message);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("เชื่อมต่อ API ไม่สำเร็จ");
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }

        function renderTable(data) {
            const head = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');
            head.innerHTML = '';
            body.innerHTML = '';

            if (data.length === 0) {
                body.innerHTML = '<tr><td class="p-10 text-center text-gray-400">ไม่พบข้อมูล</td></tr>';
                return;
            }

            // สร้างหัวจากข้อมูลที่ได้
            const keys = Object.keys(data[0]);
            keys.forEach(key => {
                const th = document.createElement('th');
                th.className = "p-4 text-sm font-semibold text-gray-600 uppercase";
                th.innerText = key;
                head.appendChild(th);
            });

            // สร้างแถวข้อมูล
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50";
                keys.forEach(key => {
                    const td = document.createElement('td');
                    td.className = "p-4 text-sm text-gray-600";
                    td.innerText = row[key] || "";
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }
    </script>
</body>
</html>
