<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pichit API Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="max-w-6xl mx-auto py-10 px-4">
        
        <div class="bg-white rounded-lg shadow-sm p-6 mb-6 border-l-4 border-blue-500">
            <h1 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                <svg class="w-8 h-8 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Pichit Library Data Connector
            </h1>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Sheet Name</label>
                    <input type="text" id="sheetName" value="Sheet1" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Search ID</label>
                    <input type="text" id="idFilter" placeholder="เช่น 1 หรือ 101" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Search Text</label>
                    <input type="text" id="searchText" placeholder="ค้นหาข้อมูลทั่วไป..." class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
                <div class="flex items-end">
                    <button onclick="fetchData()" id="btnMain" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200 flex justify-center items-center">
                        <span id="btnLabel">ดึงข้อมูลข้อมูล</span>
                        <div id="btnLoader" class="hidden loader ease-linear rounded-full border-2 border-t-2 border-gray-200 h-5 w-5 ml-2"></div>
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                <span class="text-gray-700 font-semibold">รายการข้อมูลในระบบ</span>
                <span id="resultCount" class="text-sm bg-blue-100 text-blue-800 py-1 px-3 rounded-full hidden"></span>
            </div>
            
            <div class="overflow-x-auto min-h-[300px]">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr id="tableHeader">
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ระบบพร้อมทำงาน</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="bg-white divide-y divide-gray-100">
                        <tr>
                            <td class="px-6 py-10 text-center text-gray-400">กรุณากดปุ่ม "ดึงข้อมูลข้อมูล" เพื่อเริ่มต้น</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <p class="text-center text-gray-400 text-xs mt-6">Data Logger: ระบบจะบันทึกทุกการเข้าถึงลงใน Sheet 'Logs' โดยอัตโนมัติ</p>
    </div>

    <script>
        // *** แก้ไข URL ให้ตรงกับ Web App ของคุณ ***
        const API_URL = "https://script.google.com/macros/s/AKfycbzDv31Nv4ikHzovaYl2As5VEe7qpArBoPHap0ZSdGmfhKByvCw-b3p89-YEiARdKApf/exec";
        const SECURITY_TOKEN = "test_token_123"; 

        async function fetchData() {
            const btn = document.getElementById('btnMain');
            const btnLabel = document.getElementById('btnLabel');
            const btnLoader = document.getElementById('btnLoader');
            const tableHeader = document.getElementById('tableHeader');
            const tableBody = document.getElementById('tableBody');
            const resultCount = document.getElementById('resultCount');

            // 1. เริ่มต้น Loading
            btn.disabled = true;
            btnLabel.innerText = "กำลังประมวลผล...";
            btnLoader.classList.remove('hidden');

            // 2. เตรียมข้อมูลที่ต้องการส่ง (Payload)
            const requestData = {
                token: SECURITY_TOKEN,
                sheetName: document.getElementById('sheetName').value,
                searchText: document.getElementById('searchText').value,
                id: document.getElementById('idFilter').value || null,
                options: {
                    limit: 50,
                    offset: 0
                }
            };

            try {
                // 3. ส่ง POST Request ไปยัง Apps Script
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors', // หรือ no-cors ขึ้นอยู่กับการตั้งค่า แต่ปกติใช้ cors สำหรับรับ JSON
                    body: JSON.stringify(requestData)
                });

                const result = await response.json();

                if (result.success) {
                    const data = result.data;
                    
                    if (data.length === 0) {
                        showEmptyState("ไม่พบข้อมูลที่ตรงตามเงื่อนไข");
                    } else {
                        renderTable(data);
                        resultCount.innerText = `พบทั้งหมด ${result.total} รายการ`;
                        resultCount.classList.remove('hidden');
                    }
                } else {
                    alert("ข้อผิดพลาดจาก Server: " + result.message);
                }

            } catch (error) {
                console.error("Error:", error);
                alert("การเชื่อมต่อล้มเหลว! โปรดตรวจสอบการ Deploy Web App และการตั้งค่า Token");
            } finally {
                // 4. สิ้นสุด Loading
                btn.disabled = false;
                btnLabel.innerText = "ดึงข้อมูลข้อมูล";
                btnLoader.classList.add('hidden');
            }
        }

        function renderTable(data) {
            const headerRow = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');
            
            headerRow.innerHTML = '';
            body.innerHTML = '';

            // สร้างหัวตารางจาก Key ของข้อมูลแถวแรก
            const keys = Object.keys(data[0]);
            keys.forEach(key => {
                const th = document.createElement('th');
                th.className = "px-6 py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider border-b";
                th.innerText = key;
                headerRow.appendChild(th);
            });

            // สร้างเนื้อหาตาราง
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition-colors duration-150";
                keys.forEach(key => {
                    const td = document.createElement('td');
                    td.className = "px-6 py-4 whitespace-nowrap text-sm text-gray-700";
                    td.innerText = item[key] || "";
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        function showEmptyState(msg) {
            document.getElementById('tableBody').innerHTML = `
                <tr>
                    <td colspan="100%" class="px-6 py-10 text-center text-gray-500 font-medium">${msg}</td>
                </tr>
            `;
            document.getElementById('resultCount').classList.add('hidden');
        }
    </script>
</body>
</html>
