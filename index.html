<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets API Client - Bootstrap 5 & AG Grid</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f7f6;
        }
        .header-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 1.5rem 1.5rem;
        }
        #myGrid {
            height: 500px;
            width: 100%;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .json-view {
            background: #272822;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            max-height: 400px;
            overflow: auto;
        }
    </style>
</head>
<body>

    <div class="header-gradient text-center">
        <div class="container">
            <h1>📊 Google Sheets API Client</h1>
            <p class="lead">จัดการข้อมูลจาก Google Sheets ด้วย AG Grid & Bootstrap 5</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title mb-4">🔍 ตัวกรองและตั้งค่า</h5>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">🔑 Token</label>
                        <input type="text" id="token" class="form-control" value="test_token_123">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">📄 Sheet Name</label>
                        <input type="text" id="sheetName" class="form-control" value="Sheet1">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">🆔 ID Filter</label>
                        <input type="text" id="idFilter" class="form-control" placeholder="ค้นหาด้วย ID">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">🔎 ค้นหาทั่วไป (Global Search)</label>
                        <input type="text" id="globalSearch" class="form-control" placeholder="พิมพ์เพื่อค้นหา..." oninput="onQuickFilterChanged()">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">📌 ขีดจำกัด (Limit)</label>
                        <input type="number" id="limit" class="form-control" value="100">
                    </div>
                    <div class="col-md-3 d-flex align-items-end gap-2">
                        <button class="btn btn-primary w-100" onclick="fetchData()">📥 ดึงข้อมูล</button>
                        <button class="btn btn-outline-secondary" onclick="exportToCSV()">📊 CSV</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <span class="fw-bold">📋 ตารางข้อมูล</span>
                <span class="badge bg-primary" id="resultCount">0 รายการ</span>
            </div>
            <div class="card-body">
                <div id="myGrid" class="ag-theme-alpine"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <ul class="nav nav-tabs card-header-tabs" id="myTab" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" id="raw-tab" data-bs-toggle="tab" data-bs-target="#raw" type="button">Raw JSON</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="curl-tab" data-bs-toggle="tab" data-bs-target="#curl" type="button">cURL Command</button>
                    </li>
                </ul>
            </div>
            <div class="card-body tab-content">
                <div class="tab-pane fade show active" id="raw">
                    <pre class="json-view" id="rawJson">{}</pre>
                </div>
                <div class="tab-pane fade" id="curl">
                    <pre class="json-view" id="curlCommand">Waiting for request...</pre>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzDv31Nv4ikHzovaYl2As5VEe7qpArBoPHap0ZSdGmfhKByvCw-b3p89-YEiARdKApf/exec';
        
        // 1. เปลี่ยนการประกาศตัวแปรเก็บ Grid
let gridApi; 

// 2. ปรับโครงสร้าง gridOptions ให้เข้ากับเวอร์ชันใหม่
const gridOptions = {
    columnDefs: [],
    rowData: [],
    defaultColDef: {
        sortable: true,
        filter: true,
        resizable: true,
        flex: 1,
        minWidth: 100
    },
    pagination: true,
    paginationPageSize: 10,
    paginationPageSizeSelector: [10, 20, 50, 100], // เพิ่มตัวเลือกจำนวนแถวต่อหน้า
};

// 3. เปลี่ยนวิธีการสร้าง Grid (Initialize)
const gridDiv = document.querySelector('#myGrid');
// ใช้ agGrid.createGrid แทน new agGrid.Grid
gridApi = agGrid.createGrid(gridDiv, gridOptions);

// 4. การเรียกใช้ฟังก์ชันต่างๆ ให้เรียกผ่าน gridApi โดยตรง
async function fetchData() {
    gridApi.showLoadingOverlay(); // เปลี่ยนจาก gridOptions.api

    useJSONP(payload);
}

function handleResponse(response) {
    if (response.success) {
        const data = response.data || [];
        
        if (data.length > 0) {
            const keys = Object.keys(data[0]);
            const colDefs = keys.map(key => ({
                field: key,
                headerName: key.charAt(0).toUpperCase() + key.slice(1),
                filter: 'agTextColumnFilter'
            }));
            gridApi.setGridOption('columnDefs', colDefs); // วิธีใหม่ในการอัปเดต Options
        }

        gridApi.setGridOption('rowData', data); // วิธีใหม่ในการใส่ข้อมูล
        document.getElementById('resultCount').textContent = `${data.length} รายการ`;
        document.getElementById('rawJson').textContent = JSON.stringify(response, null, 2);
    } else {
        alert('Error: ' + response.message);
    }
    gridApi.hideOverlay();
}

function onQuickFilterChanged() {
    // ใช้ setGridOption สำหรับ quickFilter
    gridApi.setGridOption('quickFilterText', document.getElementById('globalSearch').value);
}

function exportToCSV() {
    gridApi.exportDataAsCsv({
        fileName: 'google-sheets-data.csv'
    });
}

        // Initialize AG Grid
        const gridDiv = document.querySelector('#myGrid');
        new agGrid.Grid(gridDiv, gridOptions);

        async function fetchData() {
            gridOptions.api.showLoadingOverlay();
            
            const payload = {
                token: document.getElementById('token').value,
                sheetName: document.getElementById('sheetName').value,
                options: {
                    limit: parseInt(document.getElementById('limit').value),
                    filters: {}
                }
            };

            const idVal = document.getElementById('idFilter').value;
            if (idVal) payload.id = idVal;

            updateCurlCommand(payload);
            useJSONP(payload);
        }

        function useJSONP(payload) {
            const callbackName = 'jsonp_callback_' + Date.now();
            window[callbackName] = function(response) {
                handleResponse(response);
                delete window[callbackName];
                document.body.removeChild(script);
            };

            const params = new URLSearchParams({
                callback: callbackName,
                sheetName: payload.sheetName
            });
            if (payload.id) params.append('id', payload.id);

            const script = document.createElement('script');
            script.src = `${API_URL}?${params.toString()}`;
            document.body.appendChild(script);
        }

        function handleResponse(response) {
            if (response.success) {
                const data = response.data || [];
                
                // สร้าง Column Definitions อัตโนมัติจาก Key ของข้อมูล
                if (data.length > 0) {
                    const keys = Object.keys(data[0]);
                    const colDefs = keys.map(key => ({
                        field: key,
                        headerName: key.charAt(0).toUpperCase() + key.slice(1),
                        filter: 'agTextColumnFilter'
                    }));
                    gridOptions.api.setColumnDefs(colDefs);
                }

                gridOptions.api.setRowData(data);
                document.getElementById('resultCount').textContent = `${data.length} รายการ`;
                document.getElementById('rawJson').textContent = JSON.stringify(response, null, 2);
            } else {
                alert('Error: ' + response.message);
            }
            gridOptions.api.hideOverlay();
        }

        function onQuickFilterChanged() {
            gridOptions.api.setQuickFilter(document.getElementById('globalSearch').value);
        }

        function exportToCSV() {
            gridOptions.api.exportDataAsCsv({
                fileName: 'google-sheets-data.csv'
            });
        }

        function updateCurlCommand(payload) {
            const command = `curl -X POST "${API_URL}" \\\n -H "Content-Type: application/json" \\\n -d '${JSON.stringify(payload, null, 2)}'`;
            document.getElementById('curlCommand').textContent = command;
        }

        // โหลดข้อมูลอัตโนมัติเมื่อเปิดหน้า
        window.onload = fetchData;
    </script>
</body>
</html>
