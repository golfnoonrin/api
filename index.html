<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pichit Data Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">ระบบดึงข้อมูลจาก Pichit API</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <input type="text" id="idFilter" placeholder="ค้นหาด้วย ID" class="border p-2 rounded">
            <input type="text" id="nameFilter" placeholder="ค้นหาด้วยชื่อ (Advanced)" class="border p-2 rounded">
            <button onclick="fetchData()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
                ดึงข้อมูล
            </button>
        </div>

        <div id="loading" class="hidden text-center text-blue-500 my-4">กำลังโหลดข้อมูล...</div>

        <div class="overflow-x-auto">
            <table class="min-w-full bg-white border border-gray-200">
                <thead class="bg-gray-50">
                    <tr id="tableHeader">
                        </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-200">
                    </tbody>
            </table>
        </div>

        <div class="mt-4 flex justify-between items-center text-sm text-gray-600">
            <div id="recordCount">จำนวนข้อมูลทั้งหมด: 0</div>
            <div class="space-x-2">
                <button onclick="changePage(-1)" class="px-3 py-1 border rounded hover:bg-gray-100">ก่อนหน้า</button>
                <span id="currentPage">หน้า 1</span>
                <button onclick="changePage(1)" class="px-3 py-1 border rounded hover:bg-gray-100">ถัดไป</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzDv31Nv4ikHzovaYl2As5VEe7qpArBoPHap0ZSdGmfhKByvCw-b3p89-YEiARdKApf/exec';
        const TOKEN = 'test_token_123'; // ต้องตรงกับ CONFIG.SECURITY_TOKEN ใน Google Apps Script
        
        let offset = 0;
        const limit = 5;

        async function fetchData() {
            const idInput = document.getElementById('idFilter').value;
            const nameInput = document.getElementById('nameFilter').value;
            const loading = document.getElementById('loading');
            
            loading.classList.remove('hidden');

            // เตรียม Payload ตามโครงสร้าง doPost ของคุณ
            const payload = {
                token: TOKEN,
                sheetName: "Sheet1",
                id: idInput || null,
                options: {
                    limit: limit,
                    offset: offset,
                    filters: nameInput ? { "name": nameInput } : {} // ตัวอย่างการใช้ Advanced Filter
                }
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // สำคัญ: Apps Script มักติด CORS ถ้าเรียกตรงๆ ให้ใช้ no-cors หรือจัดการทางฝั่ง Server
                    body: JSON.stringify(payload)
                });

                /* หมายเหตุ: หากใช้ mode: 'no-cors' คุณจะไม่สามารถอ่าน response body ได้ 
                   เพื่อการทดสอบที่สมบูรณ์ แนะนำให้เปิด CORS ใน Apps Script หรือใช้ Redirect เทคนิค
                */
                
                // สำหรับการทดสอบผ่าน Web App ปกติ ให้ใช้ code ด้านล่าง (ต้องแน่ใจว่า Apps Script return ContentService.createTextOutput)
                const realResponse = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const result = await realResponse.json();

                if (result.success) {
                    renderTable(result.data);
                    document.getElementById('recordCount').innerText = `จำนวนข้อมูลทั้งหมด: ${result.total}`;
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อ API');
            } finally {
                loading.classList.add('hidden');
            }
        }

        function renderTable(data) {
            const head = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');
            head.innerHTML = '';
            body.innerHTML = '';

            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="100%" class="p-4 text-center">ไม่พบข้อมูล</td></tr>';
                return;
            }

            // สร้างหัวตารางจาก Keys ของ Object แรก
            const keys = Object.keys(data[0]);
            keys.forEach(key => {
                const th = document.createElement('th');
                th.className = 'px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase';
                th.innerText = key;
                head.appendChild(th);
            });

            // สร้างแถวข้อมูล
            data.forEach(row => {
                const tr = document.createElement('tr');
                keys.forEach(key => {
                    const td = document.createElement('td');
                    td.className = 'px-4 py-2 whitespace-nowrap text-sm text-gray-700';
                    td.innerText = row[key];
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        function changePage(step) {
            offset = Math.max(0, offset + (step * limit));
            document.getElementById('currentPage').innerText = `หน้า ${(offset/limit) + 1}`;
            fetchData();
        }

        // โหลดข้อมูลครั้งแรก
        fetchData();
    </script>
</body>
</html>
