<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pichit Library API Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6 border border-slate-200">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">ระบบดึงข้อมูลจาก Google Sheet</h1>
            <p class="text-slate-500 mb-6">ดึงข้อมูลผ่าน Pichit Library API</p>
            
            <div class="flex flex-wrap gap-3">
                <button id="btnFetch" onclick="loadData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg font-semibold transition all shadow-md flex items-center">
                    <span id="btnText">คลิกเพื่อดึงข้อมูล</span>
                    <div id="loader" class="hidden ml-3 w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                </button>
                
                <button onclick="clearTable()" class="text-slate-600 hover:bg-slate-100 px-4 py-2.5 rounded-lg transition">
                    ล้างหน้าจอ
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-100 border-b border-slate-200">
                        <tr id="tableHead">
                            <th class="p-4 text-slate-400 font-medium italic">รอการดึงข้อมูล...</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
        
        <div id="summary" class="mt-4 text-sm text-slate-500 hidden">
            พบข้อมูลทั้งหมด <span id="totalCount" class="font-bold text-indigo-600">0</span> รายการ
        </div>
    </div>

    <script>
        // กำหนดค่า Config
        const API_URL = "https://script.google.com/macros/s/AKfycbzDv31Nv4ikHzovaYl2As5VEe7qpArBoPHap0ZSdGmfhKByvCw-b3p89-YEiARdKApf/exec";
        const REQUEST_BODY = {
            token: "test_token_123", // ต้องตรงกับใน Code.gs
            sheetName: "Sheet1",
            searchText: "", 
            options: {
                limit: 20,
                offset: 0
            }
        };

        async function loadData() {
            const btn = document.getElementById('btnFetch');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');
            const summary = document.getElementById('summary');

            // 1. แสดงสถานะกำลังโหลด
            btn.disabled = true;
            btnText.innerText = "กำลังดึงข้อมูล...";
            loader.classList.remove('hidden');

            try {
                // 2. เรียก API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(REQUEST_BODY)
                });

                const result = await response.json();

                if (result.success && result.data.length > 0) {
                    renderTable(result.data);
                    document.getElementById('totalCount').innerText = result.total;
                    summary.classList.remove('hidden');
                } else {
                    alert("ไม่พบข้อมูลหรือเกิดข้อผิดพลาด: " + (result.message || "Unknown error"));
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                alert("การเชื่อมต่อล้มเหลว ตรวจสอบ Console หรือการ Deploy Web App");
            } finally {
                // 3. คืนค่าสถานะปุ่ม
                btn.disabled = false;
                btnText.innerText = "คลิกเพื่อดึงข้อมูล";
                loader.classList.add('hidden');
            }
        }

        function renderTable(data) {
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');
            
            // ล้างตารางเดิม
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';

            // 1. สร้างหัวตาราง (Headers) จาก Keys ของ Object
            const headers = Object.keys(data[0]);
            headers.forEach(key => {
                const th = document.createElement('th');
                th.className = "p-4 text-slate-700 font-semibold text-sm uppercase";
                th.innerText = key;
                tableHead.appendChild(th);
            });

            // 2. สร้างแถวข้อมูล (Rows)
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                headers.forEach(key => {
                    const td = document.createElement('td');
                    td.className = "p-4 text-slate-600 text-sm";
                    td.innerText = item[key] || '-';
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });
        }

        function clearTable() {
            document.getElementById('tableHead').innerHTML = '<th class="p-4 text-slate-400 font-medium italic">รอการดึงข้อมูล...</th>';
            document.getElementById('tableBody').innerHTML = '';
            document.getElementById('summary').classList.add('hidden');
        }
    </script>
</body>
</html>
